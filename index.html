<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Museo Educativo</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>MUSEO EDUCATIVO</h1>

<div id="museumLayout">

  <aside id="panelNac" class="sidePanel nac">
    <h3>Galerías Nacionales</h3>
    <ul id="listNac"></ul>
  </aside>

  <div id="stage">
    <div id="sceneLabel">Exterior</div>
    <div id="minimap">
      <span id="zoneNac">NAC</span>
      <span id="zoneIntl">INTL</span>
    </div>

    <canvas id="game" width="960" height="480"></canvas>

    <div id="fade"></div>

    <div id="touchControls">
      <div id="joystickZone">
        <div id="joystickBase">
          <div id="joystickStick"></div>
        </div>
      </div>
      <button id="btnAction">E</button>
    </div>

    <div id="progressBar">
      <div id="progressFill"></div>
      <span id="progressText">0/10 estaciones</span>
    </div>
  </div>

  <aside id="panelIntl" class="sidePanel intl">
    <h3>Galerías Internacionales</h3>
    <ul id="listIntl"></ul>
  </aside>

</div>

<div id="hint">
  <span class="key">&#8593;</span><span class="key">&#8592;</span><span class="key">&#8595;</span><span class="key">&#8594;</span>
  o <span class="key">WASD</span> mover
  &nbsp; Puerta: entrar/salir
  &nbsp; <span class="key">E</span> o clic: abrir ficha
</div>

<p id="footerTag">EDUQUÉMONOS CON TICS</p>

<div id="modalOverlay">
  <div id="modalCard">
    <button id="closeBtn">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
</body>
</html>
